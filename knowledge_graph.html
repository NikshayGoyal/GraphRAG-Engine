    <title>DS Knowledge Navigator - Knowledge Graph Visualization</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0e17;
            color: #e0e6ed;
            overflow: hidden;
        }
        #header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            background: linear-gradient(135deg, #0d1321 0%, #1a1f35 100%);
            border-bottom: 1px solid #2a3050;
            padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between;
        }
        #header h1 {
            font-size: 18px; font-weight: 600;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .stats {
            display: flex; gap: 20px; font-size: 13px; color: #8892a8;
        }
        .stats span { color: #60a5fa; font-weight: 600; }
        #sidebar {
            position: fixed; top: 52px; right: 0; width: 320px; bottom: 0;
            background: #0d1321; border-left: 1px solid #2a3050;
            padding: 16px; overflow-y: auto; z-index: 10;
        }
        #sidebar h3 {
            font-size: 14px; color: #8892a8; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 12px;
        }
        .entity-card {
            background: #151b2e; border: 1px solid #2a3050; border-radius: 8px;
            padding: 12px; margin-bottom: 8px;
        }
        .entity-card h4 { font-size: 14px; color: #60a5fa; margin-bottom: 4px; }
        .entity-card .type {
            font-size: 11px; color: #0a0e17; padding: 2px 8px;
            border-radius: 10px; display: inline-block; margin-bottom: 6px;
        }
        .entity-card p { font-size: 12px; color: #8892a8; line-height: 1.4; }
        .connections { margin-top: 8px; }
        .connections li {
            font-size: 11px; color: #6b7994; list-style: none;
            padding: 2px 0; border-bottom: 1px solid #1a2040;
        }
        .connections li:last-child { border-bottom: none; }
        #legend {
            position: fixed; bottom: 16px; left: 16px; z-index: 10;
            background: #151b2eee; border: 1px solid #2a3050; border-radius: 10px;
            padding: 12px 16px; display: flex; gap: 12px; flex-wrap: wrap;
        }
        .legend-item {
            display: flex; align-items: center; gap: 6px; font-size: 11px; color: #8892a8;
        }
        .legend-dot {
            width: 10px; height: 10px; border-radius: 50%;
        }
        #graph { position: fixed; top: 52px; left: 0; right: 320px; bottom: 0; }
        canvas { display: block; }
        #community-filter {
            margin-bottom: 16px;
        }
        #community-filter select {
            width: 100%; padding: 8px; background: #151b2e; color: #e0e6ed;
            border: 1px solid #2a3050; border-radius: 6px; font-size: 13px;
        }
    </style>

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('graph');

    let width, height;
    function resize() {
        width = container.clientWidth;
        height = container.clientHeight;
        canvas.width = width * devicePixelRatio;
        canvas.height = height * devicePixelRatio;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // Build nodes and edges
    const nodes = graphData.nodes.map((n, i) => ({
        id: n.id, label: n.label, type: n.type || 'unknown',
        description: n.description || '',
        community: n.community !== undefined ? n.community : 0,
        x: width/2 + (Math.random()-0.5)*width*0.7,
        y: height/2 + (Math.random()-0.5)*height*0.7,
        vx: 0, vy: 0,
        radius: Math.min(8 + (n.degree || 0) * 0.8, 20),
    }));

    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    const edges = graphData.edges.map(e => ({
        source: nodeMap[e.source], target: nodeMap[e.target],
        weight: e.weight || 1, descriptions: e.descriptions || []
    })).filter(e => e.source && e.target);

    // Compute degree
    edges.forEach(e => {
        e.source.radius = Math.min((e.source.radius || 6) + 0.5, 22);
        e.target.radius = Math.min((e.target.radius || 6) + 0.5, 22);
    });

    // Update stats
    document.getElementById('nodeCount').textContent = nodes.length;
    document.getElementById('edgeCount').textContent = edges.length;
    document.getElementById('commCount').textContent = new Set(nodes.map(n=>n.community)).size;

    // Build legend
    const legend = document.getElementById('legend');
    Object.entries(TYPE_COLORS).forEach(([type, color]) => {
        const count = nodes.filter(n=>n.type===type).length;
        if (count > 0) {
            legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${type} (${count})</div>`;
        }
    });

    // Community filter
    const commSelect = document.getElementById('commSelect');
    const comms = [...new Set(nodes.map(n=>n.community))].sort((a,b)=>a-b);
    comms.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = `Community ${c} (${nodes.filter(n=>n.community===c).length})`;
        commSelect.appendChild(opt);
    });
    let filterComm = 'all';
    commSelect.addEventListener('change', e => { filterComm = e.target.value; });

    // Force simulation
    let selectedNode = null;
    let dragNode = null;
    let transform = { x: 0, y: 0, scale: 1 };

    function simulate() {
        const k = 0.01, repulsion = 3000, damping = 0.85, gravity = 0.02;

        nodes.forEach(n1 => {
            n1.vx *= damping; n1.vy *= damping;
            // Gravity toward center
            n1.vx += (width/2 - n1.x) * gravity;
            n1.vy += (height/2 - n1.y) * gravity;

            nodes.forEach(n2 => {
                if (n1 === n2) return;
                let dx = n1.x - n2.x, dy = n1.y - n2.y;
                let dist = Math.sqrt(dx*dx + dy*dy) || 1;
                let force = repulsion / (dist * dist);
                n1.vx += (dx/dist) * force;
                n1.vy += (dy/dist) * force;
            });
        });

        edges.forEach(e => {
            let dx = e.target.x - e.source.x;
            let dy = e.target.y - e.source.y;
            let dist = Math.sqrt(dx*dx + dy*dy) || 1;
            let force = (dist - 120) * k;
            let fx = (dx/dist) * force;
            let fy = (dy/dist) * force;
            e.source.vx += fx; e.source.vy += fy;
            e.target.vx -= fx; e.target.vy -= fy;
        });

        nodes.forEach(n => {
            if (n === dragNode) return;
            n.x += n.vx * 0.1;
            n.y += n.vy * 0.1;
            n.x = Math.max(20, Math.min(width-20, n.x));
            n.y = Math.max(20, Math.min(height-20, n.y));
        });
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        ctx.save();
        ctx.translate(transform.x, transform.y);
        ctx.scale(transform.scale, transform.scale);

        const visible = filterComm === 'all' ? nodes : nodes.filter(n => n.community === parseInt(filterComm));
        const visibleIds = new Set(visible.map(n=>n.id));

        // Draw edges
        edges.forEach(e => {
            if (!visibleIds.has(e.source.id) || !visibleIds.has(e.target.id)) return;
            ctx.beginPath();
            ctx.moveTo(e.source.x, e.source.y);
            ctx.lineTo(e.target.x, e.target.y);
            const isSelected = selectedNode && (e.source === selectedNode || e.target === selectedNode);
            ctx.strokeStyle = isSelected ? '#60a5fa88' : '#ffffff15';
            ctx.lineWidth = isSelected ? 2 : 0.5;
            ctx.stroke();
        });

        // Draw nodes
        visible.forEach(n => {
            const isSelected = n === selectedNode;
            const color = TYPE_COLORS[n.type] || TYPE_COLORS.unknown;

            // Glow
            if (isSelected) {
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.radius + 6, 0, Math.PI*2);
                ctx.fillStyle = color + '33';
                ctx.fill();
            }

            ctx.beginPath();
            ctx.arc(n.x, n.y, n.radius, 0, Math.PI*2);
            ctx.fillStyle = isSelected ? color : color + 'cc';
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = isSelected ? 2 : 0.5;
            ctx.stroke();

            // Label
            if (n.radius > 7 || isSelected || transform.scale > 1.2) {
                ctx.font = `${isSelected ? 'bold ' : ''}${Math.max(9, 11/transform.scale)}px Segoe UI`;
                ctx.fillStyle = '#e0e6edcc';
                ctx.textAlign = 'center';
                ctx.fillText(n.label.length > 20 ? n.label.slice(0,18)+'..' : n.label, n.x, n.y + n.radius + 14);
            }
        });

        ctx.restore();
    }

    function loop() {
        simulate();
        draw();
        requestAnimationFrame(loop);
    }
    loop();

    // Mouse interaction
    function getMouseNode(mx, my) {
        const sx = (mx - transform.x) / transform.scale;
        const sy = (my - transform.y) / transform.scale;
        for (let i = nodes.length-1; i >= 0; i--) {
            const n = nodes[i];
            const dx = sx - n.x, dy = sy - n.y;
            if (dx*dx + dy*dy < n.radius*n.radius + 100) return n;
        }
        return null;
    }

    canvas.addEventListener('mousedown', e => {
        const node = getMouseNode(e.offsetX, e.offsetY);
        if (node) { dragNode = node; selectedNode = node; showEntityInfo(node); }
    });
    canvas.addEventListener('mousemove', e => {
        if (dragNode) {
            dragNode.x = (e.offsetX - transform.x) / transform.scale;
            dragNode.y = (e.offsetY - transform.y) / transform.scale;
        }
    });
    canvas.addEventListener('mouseup', () => { dragNode = null; });
    canvas.addEventListener('wheel', e => {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 0.9 : 1.1;
        transform.scale *= factor;
        transform.x = e.offsetX - (e.offsetX - transform.x) * factor;
        transform.y = e.offsetY - (e.offsetY - transform.y) * factor;
    });

    function showEntityInfo(node) {
        const neighbors = edges
            .filter(e => e.source === node || e.target === node)
            .map(e => {
                const other = e.source === node ? e.target : e.source;
                const desc = e.descriptions[0] || 'related';
                return `<li>${other.label} <span style="color:#4b5563">- ${desc}</span></li>`;
            });

        const color = TYPE_COLORS[node.type] || TYPE_COLORS.unknown;
        document.getElementById('entityInfo').innerHTML = `
            <div class="entity-card">
                <h4>${node.label}</h4>
                <span class="type" style="background:${color}">${node.type}</span>
                <p>${node.description}</p>
                <p style="margin-top:6px;color:#60a5fa;font-size:11px;">Community ${node.community}</p>
                ${neighbors.length ? `<div class="connections"><ul>${neighbors.join('')}</ul></div>` : ''}
            </div>`;
    }
    </script>
